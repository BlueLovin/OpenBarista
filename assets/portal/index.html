<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenBarista Provisioning</title>
    <link rel="stylesheet" href="/portal.css" />
    <script src="/portal.js" defer></script>
  </head>
  <body>
    <div class="mesh"></div>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">OpenBarista Device Setup</p>
        <h1>Bring your espresso station online</h1>
        <p class="subtitle">
          Connect this board to your home Wi-Fi. You can update credentials
          later from the station dashboard.
        </p>
        <div class="identity">
          <span><strong>Build:</strong> <code>{{BUILD_ID}}</code></span>
          <span><strong>Board:</strong> <code>{{BOARD_ID}}</code></span>
        </div>
      </section>

      <section class="card" aria-labelledby="wifi-title">
        <h2 id="wifi-title">Wi-Fi Provisioning</h2>
        <form method="POST" action="/connect">
          <label for="networkSelect">Nearby Networks</label>
          <div class="row">
            <select id="networkSelect" aria-label="Nearby networks">
              <option value="">Scanning...</option>
            </select>
            <button class="btn-secondary" type="button" id="refreshBtn">
              Refresh
            </button>
          </div>

          <label for="ssid">Network Name (SSID)</label>
          <input
            type="text"
            id="ssid"
            name="ssid"
            required
            maxlength="32"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          />
          <p id="netStatus" class="status">Scanning nearby networks...</p>

          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            maxlength="64"
            autocomplete="off"
          />
          <button type="submit" class="btn-primary">Connect and Reboot</button>
        </form>
      </section>
    </main>
  </body>
</html>
