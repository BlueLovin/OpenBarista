[build]
target = "xtensa-esp32-espidf"

[target.xtensa-esp32-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"

[unstable]
build-std = ["std", "panic_abort"]

[env]
MCU = "esp32"
# Enable the IDF Component Manager so that managed components (e.g.
# espressif/mdns) declared in main/idf_component.yml are downloaded and
# included in the build.
ESP_IDF_COMPONENT_MANAGER = "true"